<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Damasceno | Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --accent: #333333;
            --modal-bg: #0f0f0f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.5;
        }

        a { text-decoration: none; color: inherit; transition: 0.3s; }
        ul { list-style: none; }
        img { display: block; max-width: 100%; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HEADER */
        header {
            padding: 40px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.5px; }
        .socials { display: flex; gap: 20px; font-size: 0.9rem; color: var(--text-secondary); }
        .socials a:hover { color: var(--text-primary); }

        /* HERO SECTION */
        .hero {
            padding: 80px 0 100px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 60px;
            align-items: center;
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 300;
            line-height: 1.1;
            margin-bottom: 30px;
        }

        .hero-content p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 500px;
            margin-bottom: 40px;
        }

        .cta-buttons { display: flex; gap: 20px; flex-wrap: wrap; }

        .btn {
            padding: 12px 30px;
            border: 1px solid var(--accent);
            border-radius: 4px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .btn:hover { background: var(--text-primary); color: var(--bg-color); }
        .btn-outline { border-color: var(--text-secondary); }

        .hero-img-container {
            position: relative;
            height: 500px;
            width: 100%;
            overflow: hidden;
            border-radius: 4px;
        }

        .hero-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 0.5s ease;
        }
        .hero-img-container:hover img { filter: grayscale(0%); transform: scale(1.03); }

        .section-divider {
            border-top: 1px solid var(--accent);
            padding: 30px 0;
            margin-bottom: 60px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        /* GRID DE PROJETOS */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 60px 40px;
            padding-bottom: 120px;
        }

        .project-card { cursor: pointer; }

        .card-img {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #111;
            margin-bottom: 20px;
            overflow: hidden;
            border-radius: 2px;
            position: relative;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.4
